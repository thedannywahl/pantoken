packages:
  - apps/*
  - docs
  - packages/*
  - formats/*
  - platforms/*
  - renderers/*
  - bundlers/*
  - design/*
  - ai/*
  - plugins/pantoken/*
  - plugins/postcss/*
  - plugins/typedoc/*
  - plugins/vite/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24.13.2
  typescript: ^6.0.3
  arkregex: ^0.0.7
  vite: npm:@voidzero-dev/vite-plus-core@0.2.2
  vite-plus: 0.2.2
  # Upstream Instructure sources
  "@instructure/instructure-design-tokens": "github:instructure/instructure-design-tokens"
  "@instructure/ui-icons": ^11.7.3
  lucide: ^1.23.0
  # Native token transforms
  style-dictionary: ^5.5.0
  "@tokens-studio/sd-transforms": ^2.0.3
  # Rehype / unist
  unist-util-visit: ^5.1.0
  # markdown-it integration
  markdown-it: ^14.1.0
  "@types/markdown-it": ^14.1.2
  # Brand icons (plugin)
  simple-icons: ^15.22.0
  # React markdown integration
  react: ^19.2.7
  react-dom: ^19.2.7
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  react-markdown: ^10.1.0
  remark-gfm: ^4.0.1
  postcss: ^8.5.16
  # Icon font chain
  points-on-path: ^0.2.1
  clipper-lib: ^6.4.2
  svgicons2svgfont: ^16.0.0
  svg2ttf: ^6.1.0
  ttf2woff2: ^8.0.1
  "@mdx-js/react": ^3.1.1
  "@instructure/ui-heading": ^11.7.3
  "@instructure/ui-text": ^11.7.3
  "@instructure/ui-link": ^11.7.3
  "@instructure/ui-list": ^11.7.3
  "@instructure/ui-table": ^11.7.3
  "@instructure/ui-view": ^11.7.3
  "@instructure/ui-img": ^11.7.3
  "@instructure/ui-alerts": ^11.7.3
  core-js: ^3.49.0
  # Quality gates
  "@commitlint/cli": ^21.2.0
  "@commitlint/config-conventional": ^21.2.0
  "@vitest/coverage-v8": ^4.1.9
  markdownlint-cli2: ^0.23.0
  publint: ^0.3.21
  "@arethetypeswrong/cli": ^0.18.4
  bumpp: ^11.1.0
  vitepress-plugin-mermaid: ^2.0.17
  mermaid: ^11.16.0
  vue: ^3.5.39
  vitepress: 2.0.0-alpha.17
  oxc-minify: ^0.138.0
  typedoc: ^0.28.19
  typedoc-plugin-markdown: ^4.12.0
  typedoc-vitepress-theme: ^1.1.3
  # @cssdoc/* toolchain — consumed from npm (published at 0.5.0). @cssdoc/markdown arrives transitively
  # via @cssdoc/typedoc; the entries below are pantoken's direct dependencies.
  "@cssdoc/core": ^0.5.0
  "@cssdoc/config": ^0.5.0
  "@cssdoc/typedoc": ^0.5.0
  "@cssdoc/stylelint-plugin": ^0.5.0
  "@cssdoc/eslint-plugin": ^0.5.0
  # Transitive deps that pantoken also uses directly (stylelint/eslint configs); the rest were mirrored
  # only for the linked cssdoc source and are now unused, kept harmless under `catalogMode: prefer`.
  ajv: ^8.20.0
  grammarkdown: ^3.3.2
  stylelint: ^17.14.0
  eslint: ^10.6.0
  "@eslint/css": ^1.4.0
  "@html-eslint/parser": ^0.63.0
  postcss-value-parser: ^4.2.0
  css-tree: ^3.2.1
  "@types/css-tree": ^2.3.11
  "@resvg/resvg-js": ^2.6.2
  esbuild: ^0.28.1
  changelogen: ^0.6.2
  "@vscode/vsce": ^3.9.2
  ovsx: ^1.0.2
  vscode-languageclient: ^10.1.0
  vscode-languageserver: ^10.1.0
  vscode-languageserver-textdocument: ^1.0.12
overrides:
  vite: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: "*"
minimumReleaseAgeExclude:
  - "@voidzero-dev/vite-plus-core@0.2.2"
  - "@voidzero-dev/vite-plus-darwin-arm64@0.2.2"
  - "@voidzero-dev/vite-plus-darwin-x64@0.2.2"
  - "@voidzero-dev/vite-plus-linux-arm64-gnu@0.2.2"
  - "@voidzero-dev/vite-plus-linux-arm64-musl@0.2.2"
  - "@voidzero-dev/vite-plus-linux-x64-gnu@0.2.2"
  - "@voidzero-dev/vite-plus-linux-x64-musl@0.2.2"
  - "@voidzero-dev/vite-plus-win32-arm64-msvc@0.2.2"
  - "@voidzero-dev/vite-plus-win32-x64-msvc@0.2.2"
  - vite-plus@0.2.2
  - "@cssdoc/core@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/dialects@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/embedded@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/index@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/lint-core@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/markdown@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/providers@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/spec@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/typedoc@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/config@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/eslint-plugin@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
  - "@cssdoc/stylelint-plugin@0.3.3 || 0.4.0 || 0.4.2 || 0.5.0"
allowBuilds:
  core-js: false
  esbuild: false
  sharp: false
  ttf2woff2: false
