name: Deploy docs

# Build the VitePress + TypeDoc site and publish it to GitHub Pages.
# Enable Pages first: repo Settings → Pages → Build and deployment → Source = GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; don't cancel it mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate token output
        # Regenerates every package's generated/ dir — the token JSON TypeDoc reads and the
        # CSS the site is themed with. Uses `vp` (from setup-vp), so the job needs no pnpm on PATH.
        run: vp run -r build

      - name: Build docs
        run: vp run @pantoken/docs#docs:build
        env:
          DOCS_BASE: /
          DOCS_HOSTNAME: https://pantoken.iywahl.com/

      - name: Write custom domain file
        run: echo "pantoken.iywahl.com" > docs/.vitepress/dist/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
