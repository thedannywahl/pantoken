name: CI

# The PR gate: build, typecheck, test, lint, and the publish/provenance checks — everything `ready`
# plus the gates covers, split into parallel jobs. Runs on every PR and on pushes to main so a
# regression is caught before merge, not at docs-deploy or release-tag time.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Supersede in-flight PR runs; let main runs finish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # vp's task cache stores task OUTPUTS as .tar.zst tarballs, so a cache hit re-materializes the
  # gitignored generated dirs. The `build` job warms it; downstream jobs restore and replay
  # `vp run -r build` as a fast cache-extract instead of a cold rebuild.
  VP_TASK_CACHE: node_modules/.vite/task-cache
  VP_CACHE_KEY_PREFIX: vp-taskcache-

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Restore/save vp task cache
        uses: actions/cache@v6
        with:
          path: ${{ env.VP_TASK_CACHE }}
          key: ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-
      - name: Build all packages
        run: vp run -r build

  typecheck:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Restore vp task cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VP_TASK_CACHE }}
          key: ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-
      - name: Materialize generated output
        run: vp run -r build
      - name: Typecheck
        run: vp check

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Restore vp task cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VP_TASK_CACHE }}
          key: ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-
      - name: Materialize generated output
        run: vp run -r build
      - name: Test all packages
        run: vp run -r test

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Restore vp task cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VP_TASK_CACHE }}
          key: ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-
      - name: Lint CSS
        run: vp run lint:css
      - name: Lint JS
        run: vp run lint:js
      - name: Validate generated output
        run: vp run validate:generated:only
      - name: Lint Markdown
        run: vp run lint:markdown

  publint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          # Full history so the changed-packages diff can reach the PR base / previous push.
          fetch-depth: 0
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Restore vp task cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VP_TASK_CACHE }}
          key: ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-
      - name: Resolve changed packages
        id: changed
        env:
          CHANGED_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: node scripts/release/changed-packages.ts
      - name: Build and publint (scoped to changed packages)
        shell: bash
        env:
          SCOPE: ${{ steps.changed.outputs.scope }}
          PACKAGES: ${{ steps.changed.outputs.packages }}
        run: |
          if [[ "${SCOPE}" == "none" ]]; then
            echo "No publishable packages changed; skipping publint."
            exit 0
          fi
          if [[ "${SCOPE}" == "all" ]]; then
            vp run -r build
            vp run gate:publint
            exit $?
          fi
          # publint only inspects the scoped packages, so build just their dependency closure ("...").
          build_filters=(); check_filters=()
          IFS=',' read -ra pkgs <<< "${PACKAGES}"
          for p in "${pkgs[@]}"; do
            [[ -n "${p}" ]] || continue
            build_filters+=("-F" "${p}...")
            check_filters+=("-F" "${p}")
          done
          echo "publint scoped to: ${pkgs[*]}"
          vp run "${build_filters[@]}" build
          vp exec "${check_filters[@]}" publint

  attw:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          # Full history so the changed-packages diff can reach the PR base / previous push.
          fetch-depth: 0
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Restore vp task cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VP_TASK_CACHE }}
          key: ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-
      - name: Resolve changed packages
        id: changed
        env:
          CHANGED_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: node scripts/release/changed-packages.ts
      - name: Build and attw (scoped to changed packages)
        shell: bash
        env:
          SCOPE: ${{ steps.changed.outputs.scope }}
          PACKAGES: ${{ steps.changed.outputs.packages }}
        run: |
          if [[ "${SCOPE}" == "none" ]]; then
            echo "No publishable packages changed; skipping attw."
            exit 0
          fi
          if [[ "${SCOPE}" == "all" ]]; then
            vp run -r build
            vp run gate:attw
            exit $?
          fi
          # attw only packs the scoped packages, so build just their dependency closure ("...").
          build_filters=(); check_filters=()
          IFS=',' read -ra pkgs <<< "${PACKAGES}"
          for p in "${pkgs[@]}"; do
            [[ -n "${p}" ]] || continue
            build_filters+=("-F" "${p}...")
            check_filters+=("-F" "${p}")
          done
          echo "attw scoped to: ${pkgs[*]}"
          vp run "${build_filters[@]}" build
          vp exec "${check_filters[@]}" attw --pack --profile strict --no-emoji --ignore-rules no-resolution cjs-resolves-to-esm

  repository:
    # Pure manifest read — no build needed. Catches a missing repository.url (which breaks npm OIDC
    # provenance) on the PR instead of at release.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Check repository metadata
        run: vp run gate:repository

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Lint PR commit messages
        run: vp exec commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

  # Detect docs-relevant changes so PRs only pay for the docs build when the site could change. Runs on
  # both events (never skipped) so the `docs` job's `needs` is always satisfied.
  docs-changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Detect docs-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'packages/**'
              - 'formats/**'
              - 'platforms/**'
              - 'renderers/**'
              - 'plugins/**'
              - 'design/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  # Build the site as part of CI, so:
  #  - PRs get the exact deploy command run — a broken build OR a stale translation cache
  #    (check-locale-drift) blocks the PR instead of only surfacing in the post-merge Deploy docs run.
  #  - main pushes upload the built site as `docs-site`, which the Deploy docs workflow publishes
  #    directly (no rebuild).
  # Gated on docs-relevant changes with the same path set the Deploy docs `changes` job uses, so the
  # artifact is uploaded exactly when a deploy will look for it.
  docs:
    needs: [build, docs-changes]
    if: needs.docs-changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true
      - name: Restore vp task cache
        uses: actions/cache/restore@v6
        with:
          path: ${{ env.VP_TASK_CACHE }}
          key: ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'vite.config.ts') }}-
            ${{ env.VP_CACHE_KEY_PREFIX }}${{ runner.os }}-
      - name: Materialize generated output
        run: vp run -r build
      - name: Build docs (locale parity + drift + VitePress build)
        run: vp run @pantoken/docs#docs:build
        env:
          DOCS_BASE: /
          DOCS_HOSTNAME: https://pantoken.iywahl.com/
      # On main, hand the built site to the Deploy docs workflow (workflow_run) so it publishes without
      # rebuilding. The CNAME is baked in here so the downloaded artifact is deploy-ready as-is.
      - name: Add custom domain file
        if: github.ref == 'refs/heads/main'
        run: echo "pantoken.iywahl.com" > docs/.vitepress/dist/CNAME
      - name: Upload built docs site
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: docs/.vitepress/dist
          retention-days: 1
