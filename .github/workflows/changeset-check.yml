name: Changeset check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  detect-release-impact:
    runs-on: ubuntu-latest
    outputs:
      release_impact: ${{ steps.filter.outputs.release_impact }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Detect release-impacting changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            release_impact:
              - 'packages/**'
              - 'formats/**'
              - 'platforms/**'
              - 'renderers/**'
              - 'bundlers/**'
              - 'design/**'
              - 'plugins/**'
              - 'ai/**'
              - 'tools/**'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'pnpm-lock.yaml'

  require-changeset:
    needs: detect-release-impact
    if: needs.detect-release-impact.outputs.release_impact == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      # A pull_request checkout lands in detached HEAD with no local `main`, so `changeset status`
      # can't find where HEAD diverged from the base branch. Materialize it as a local ref.
      - name: Make base branch available for changeset diff
        run: git fetch --no-tags origin +refs/heads/${{ github.base_ref }}:refs/heads/${{ github.base_ref }}

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      # Both release checks are skipped on the changesets bot's "Version Packages" PR: it bumps every
      # releasing package's package.json and deletes the changesets, so `changeset status` errors
      # ("packages changed but no changesets") and coverage has nothing to cover. Skipping the steps
      # (rather than the job) keeps this required check green on that PR.
      - name: Verify release metadata
        if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
        run: vp run release:status

      # Fail when a changed publishable package has no pending changeset bumping it — `release:status`
      # alone passes as long as any changeset exists, so an unrelated/empty changeset would let an
      # unreleased change merge (which is how the CDN work shipped without publishing).
      - name: Require a changeset for each changed publishable package
        if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
        env:
          CHANGESET_BASE: ${{ github.base_ref }}
        run: vp run release:coverage

  docs-and-internal-only:
    needs: detect-release-impact
    if: needs.detect-release-impact.outputs.release_impact != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip changeset requirement
        run: |
          echo "No release-impacting files changed."
          echo "Changeset requirement is skipped for docs/internal-only PRs."
