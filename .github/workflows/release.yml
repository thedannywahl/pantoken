name: Release

# Automated releases via the changesets action. On push to main:
#  - with pending changesets, it opens/updates a "Version Packages" PR (runs `changeset version` →
#    version bumps + per-package CHANGELOGs);
#  - once that PR merges (no changesets left), it publishes the bumped packages to npm with provenance
#    and cuts a GitHub release per package.
#
# Requires (one-time):
#  - A `RELEASE_PAT` secret: a fine-grained personal access token scoped to this repo with
#    Contents: read/write + Pull requests: read/write. The Version PR is opened with this token so CI
#    runs on it automatically — PRs authored by the built-in GITHUB_TOKEN don't trigger workflows (their
#    checks sit in `action_required`).
#  - An `NPM_TOKEN` secret for publish auth (provenance rides on `id-token: write`).

on:
  push:
    branches: [main]
  workflow_dispatch: # manual re-trigger (e.g. to re-attempt a failed publish; publish is idempotent)

permissions:
  contents: write # commit version bumps, push tags, create releases
  pull-requests: write # open/update the Version Packages PR
  id-token: write # npm provenance (OIDC)

# One release run at a time; never cancel a run mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Use the fine-grained PAT so the Version PR (and its branch push) is authored by a real user,
          # not the built-in GITHUB_TOKEN — which is what lets CI run on that PR automatically.
          token: ${{ secrets.RELEASE_PAT }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      # Build so `changeset publish` ships real dist. Publish ignores lifecycle scripts (below), so a
      # package's `prepublishOnly` won't re-invoke a nested `vp` (which can fail with os error 22).
      - name: Build all packages
        run: vp run -r build

      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: vp run release:version
          publish: vp run release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
          PNPM_CONFIG_IGNORE_SCRIPTS: "true"
