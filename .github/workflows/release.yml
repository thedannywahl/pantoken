name: Release package

on:
  push:
    tags:
      - "@pantoken/*@v*"
  workflow_dispatch:
    inputs:
      package_tag:
        description: "Package tag (for example: @pantoken/components@v1.0.0)"
        required: true
        type: string
      dist_tag:
        description: "Optional npm dist-tag override (for example: latest, next, beta)"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.package_tag || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      - name: Set up pnpm for publish
        run: |
          corepack enable
          corepack prepare pnpm@11.13.0 --activate
          pnpm --version

      - name: Verify release gates
        run: |
          vp run ready
          vp run gate:publint
          vp run gate:attw

      - name: Build package release plan
        run: |
          node scripts/release/plan-package-release.ts \
            --tag "${RELEASE_TAG}" \
            --json .release-plan.json \
            --publish-list .release-packages.txt \
            --markdown .release-plan.md

      - name: Read release plan metadata
        id: plan
        shell: bash
        run: |
          target_private=$(node -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync(".release-plan.json","utf8"));process.stdout.write(String(Boolean(p.targetPrivate)));')
          publish_count=$(node -e 'const fs=require("fs");const p=JSON.parse(fs.readFileSync(".release-plan.json","utf8"));process.stdout.write(String((p.publishPackages??[]).length));')
          echo "target_private=${target_private}" >> "${GITHUB_OUTPUT}"
          echo "publish_count=${publish_count}" >> "${GITHUB_OUTPUT}"

      - name: Resolve npm dist-tag and prerelease state
        id: dist_tag
        if: steps.plan.outputs.target_private != 'true' && steps.plan.outputs.publish_count != '0'
        shell: bash
        env:
          INPUT_DIST_TAG: ${{ inputs.dist_tag }}
        run: |
          version="${RELEASE_TAG##*@v}"

          if [[ -n "${INPUT_DIST_TAG}" ]]; then
            tag="${INPUT_DIST_TAG}"
          elif [[ "${version}" == *"-alpha."* ]]; then
            tag="alpha"
          elif [[ "${version}" == *"-beta."* ]]; then
            tag="beta"
          elif [[ "${version}" == *"-rc."* ]]; then
            tag="rc"
          elif [[ "${version}" == *"-"* ]]; then
            tag="next"
          else
            tag="latest"
          fi

          if [[ "${version}" == *"-"* ]]; then
            prerelease="true"
          else
            prerelease="false"
          fi

          echo "dist_tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "Publishing with npm dist-tag: ${tag}"

      - name: Publish release set
        if: steps.plan.outputs.target_private != 'true' && steps.plan.outputs.publish_count != '0'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
          NPM_CONFIG_FORCE: "true"
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
          PNPM_CONFIG_IGNORE_SCRIPTS: "true"
        run: |
          while IFS= read -r pkg; do
            [[ -z "${pkg}" ]] && continue
            echo "Publishing ${pkg}"
            pnpm -F "${pkg}" publish --tag "${{ steps.dist_tag.outputs.dist_tag }}" --access public --no-git-checks
          done < .release-packages.txt

      - name: Build package release notes
        run: |
          node scripts/release/build-release-notes.ts \
            --tag "${RELEASE_TAG}" \
            --plan .release-plan.json \
            --out release-notes.md

      - name: Create GitHub release
        if: github.event_name == 'push' && steps.plan.outputs.target_private != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          prerelease: ${{ steps.dist_tag.outputs.prerelease }}
