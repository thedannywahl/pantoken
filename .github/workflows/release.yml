name: Release

# Automated releases via the changesets action. On push to main:
#  - with pending changesets, it opens/updates a "Version Packages" PR (runs `changeset version` →
#    version bumps + per-package CHANGELOGs);
#  - once that PR merges (no changesets left), it publishes the bumped packages to npm with provenance
#    (via `release:publish` → scripts/release/publish-npm.ts, the npm CLI) and cuts a GitHub release per
#    package from the script's `New tag:` stdout.
#
# Token-free: publishing uses npm OIDC "trusted publishing" (`id-token: write` + `npm publish`), not an
# `NPM_TOKEN`. Requires (one-time): repo Settings → Actions → General → Workflow permissions → "Allow
# GitHub Actions to create and approve pull requests" (so the action can open the Version PR), and a
# trusted publisher for EACH published package on npmjs.com (package → Settings → Trusted Publisher:
# GitHub Actions, repo `thedannywahl/pantoken`, workflow `release.yml`). A package with no trusted
# publisher 404s on publish; the script logs it and continues, so the rest still ship.

on:
  push:
    branches: [main]
  workflow_dispatch: # manual re-trigger (e.g. to re-attempt a failed publish; publish is idempotent)

permissions:
  contents: write # commit version bumps, push tags, create releases
  pull-requests: write # open/update the Version Packages PR
  id-token: write # npm provenance (OIDC)

# One release run at a time; never cancel a run mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing needs npm ≥ 11.5.1; Node 22's bundled npm is older. Upgrade the global npm
      # the publish script shells out to.
      - name: Upgrade npm for OIDC publishing
        run: npm install -g npm@latest

      - name: Set up Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          run-install: true

      # Build so the publish step ships real dist/. prepublishOnly was removed repo-wide (#23), so no
      # package re-invokes a nested `vp` at pack time.
      - name: Build all packages
        run: vp run -r build

      - name: Create Version PR or publish
        uses: changesets/action@v1
        with:
          version: vp run release:version
          publish: vp run release:publish
          commit: "chore: version packages"
          title: "chore: version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
