<div class="instui-card">
  <div style="display: flex; flex-direction: column; gap: 16px">
    <!-- Meter colour lives on the bar root (our normalized -color-* scheme); value label sits beside it -->
    <div style="display: flex; align-items: center; gap: 8px">
      <div class="instui-progress -color-brand" style="flex: 1">
        <div class="bar" style="width: 40%"></div>
      </div>
      <span class="instui-progress-value">40%</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px">
      <div class="instui-progress -color-success -size-sm" style="flex: 1">
        <div class="bar" style="width: 70%"></div>
      </div>
      <span class="instui-progress-value">70%</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px">
      <div class="instui-progress -color-warning" style="flex: 1">
        <div class="bar" style="width: 55%"></div>
      </div>
      <span class="instui-progress-value">55%</span>
    </div>
    <div style="display: flex; align-items: center; gap: 8px">
      <div class="instui-progress -color-danger -size-lg" style="flex: 1">
        <div class="bar" style="width: 25%"></div>
      </div>
      <span class="instui-progress-value">25%</span>
    </div>
  </div>
</div>
