<div class="instui-card">
  <div style="display: flex; flex-direction: column; gap: 20px">
    <!-- Standalone count badges, plus an overflow count and the inverse chip on a colour surface. -->
    <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap">
      <span class="instui-badge">4</span>
      <span class="instui-badge -color-success">9</span>
      <span class="instui-badge -color-danger">3</span>
      <span class="instui-badge" data-count>1</span>
      <!-- Inverse is a light chip, so it needs a colour/dark surface to read against. -->
      <span class="badge-on-color">
        <span class="instui-badge -color-inverse">7</span>
      </span>
    </div>

    <!-- Placed over a target: a count bubble, a pulsing notification dot, and a standalone pulse. -->
    <div style="display: flex; gap: 28px; align-items: center; flex-wrap: wrap">
      <span class="instui-badge__wrapper">
        <span class="instui-avatar -color-blue">AB</span>
        <span class="instui-badge -color-danger -placement-top-end">5</span>
      </span>
      <span class="instui-badge__wrapper">
        <span class="instui-avatar -color-green">CD</span>
        <span class="instui-badge -color-success -placement-bottom-start">2</span>
      </span>
      <span class="instui-badge__wrapper">
        <button class="instui-button -color-secondary">Inbox</button>
        <span
          class="instui-badge -type-notification -color-danger -placement-top-end -pulse"
        ></span>
      </span>
      <span class="instui-badge -color-success -pulse">New</span>
    </div>
  </div>
</div>

<style>
  .badge-on-color {
    display: inline-flex;
    padding: 8px 12px;
    border-radius: var(--instui-border-radius-md);
    /* A fixed dark brand surface (the navy primitive doesn't flip with the mode), so the light
       inverse chip reads in both light and dark. */
    background: var(--instui-primitive-color-navy-navy170);
  }
</style>

<script>
  // countUntil: when the count reaches the cap, show `${countUntil - 1}+` (e.g. 99+).
  const countUntil = 100;
  const count = 250;
  const el = document.querySelector("[data-count]");
  el.textContent = count >= countUntil ? `${countUntil - 1}+` : String(count);
</script>
