<!-- The rail sits on a page (no card) and runs full height. This demo gives it a page-tall row; in a
     real layout the nav is one full-height column beside the content. -->
<div style="display: flex; min-height: 420px; background: var(--instui-color-background-secondary)">
  <nav class="instui-side-nav-bar" aria-label="Primary">
    <a class="item -selected" href="#"
      ><span class="instui-icon -icon-house"></span><span class="label">Home</span></a
    >
    <a class="item" href="#"
      ><span class="instui-icon -icon-inbox"></span><span class="label">Inbox</span></a
    >
    <a class="item" href="#"
      ><span class="instui-icon -icon-calendar"></span><span class="label">Calendar</span></a
    >
    <a class="item" href="#"
      ><span class="instui-icon -icon-settings"></span><span class="label">Settings</span></a
    >
  </nav>

  <!-- -minimized: icons only (labels hidden). -->
  <nav class="instui-side-nav-bar -minimized" aria-label="Primary (minimized)">
    <a class="item -selected" href="#"
      ><span class="instui-icon -icon-house"></span><span class="label">Home</span></a
    >
    <a class="item" href="#"
      ><span class="instui-icon -icon-inbox"></span><span class="label">Inbox</span></a
    >
    <a class="item" href="#"
      ><span class="instui-icon -icon-calendar"></span><span class="label">Calendar</span></a
    >
  </nav>

  <div style="flex: 1; padding: 24px" class="instui-text">Page content sits beside the rail.</div>
</div>
