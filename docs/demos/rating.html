<div class="instui-card">
  <div style="display: flex; flex-direction: column; gap: 14px; align-items: flex-start">
    <!-- Stars are icon glyphs: -icon-star-solid for filled, -icon-star for empty. -->
    <span class="instui-rating -size-sm" role="img" aria-label="2 out of 3 stars">
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star"></span>
      <span class="label">2/3</span>
    </span>

    <span class="instui-rating" role="img" aria-label="3 out of 5 stars">
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star"></span>
      <span class="instui-icon -icon-star"></span>
      <span class="label">3/5</span>
    </span>

    <span class="instui-rating -size-lg" role="img" aria-label="4 out of 5 stars">
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star-solid"></span>
      <span class="instui-icon -icon-star"></span>
      <span class="label">4/5</span>
    </span>
  </div>
</div>
