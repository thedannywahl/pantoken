<div class="instui-card">
  <div style="display: flex; gap: 32px; flex-wrap: wrap">
    <div class="instui-metric">
      <span class="value">1,284</span>
      <span class="label">Active users</span>
    </div>
    <div class="instui-metric">
      <span class="value">98%</span>
      <span class="label">Uptime</span>
    </div>
    <div class="instui-metric">
      <span class="value">3.2s</span>
      <span class="label">Avg. response</span>
    </div>
  </div>

  <hr style="margin: 24px 0; border: 0; border-top: 1px solid var(--instui-color-border-primary)" />

  <!-- textAlign: start / center / end (each metric given a width so the alignment is visible) -->
  <div style="display: flex; gap: 16px; flex-wrap: wrap">
    <div
      class="instui-metric -text-align-start"
      style="
        width: 140px;
        background: var(--instui-color-background-page);
        border-radius: 6px;
        padding: 8px 12px;
      "
    >
      <span class="value">Start</span>
      <span class="label">-text-align-start</span>
    </div>
    <div
      class="instui-metric -text-align-center"
      style="
        width: 140px;
        background: var(--instui-color-background-page);
        border-radius: 6px;
        padding: 8px 12px;
      "
    >
      <span class="value">Center</span>
      <span class="label">-text-align-center</span>
    </div>
    <div
      class="instui-metric -text-align-end"
      style="
        width: 140px;
        background: var(--instui-color-background-page);
        border-radius: 6px;
        padding: 8px 12px;
      "
    >
      <span class="value">End</span>
      <span class="label">-text-align-end</span>
    </div>
  </div>
</div>
