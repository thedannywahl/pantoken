<div class="instui-card">
  <div style="display: flex; flex-direction: column; gap: 12px; max-width: 320px">
    <select class="instui-simple-select">
      <option>Choose a fruit…</option>
      <option>Apple</option>
      <option>Orange</option>
      <option>Pear</option>
    </select>
    <select class="instui-simple-select -invalid">
      <option>Invalid selection</option>
    </select>
    <select class="instui-simple-select -size-sm">
      <option>Small</option>
    </select>
    <select class="instui-simple-select" disabled>
      <option>Disabled</option>
    </select>
  </div>
</div>
