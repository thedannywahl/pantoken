<div style="display: flex; flex-direction: column; gap: 20px">
  <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap">
    <button class="instui-button">Button</button>
    <button class="instui-button -color-secondary">Secondary</button>
    <span class="instui-badge -color-danger">3</span>
    <span class="instui-badge -color-inverse">7</span>
    <span class="instui-pill -color-success">Published</span>
    <span class="instui-tag">tag</span>
    <button class="instui-tag -inline">dismissible</button>
    <span class="instui-avatar -color-blue">AB</span>
  </div>

  <div class="instui-alert -color-info">An alert, styled from the tokens.</div>

  <div style="display: flex; gap: 24px; align-items: center; flex-wrap: wrap">
    <div class="instui-metric">
      <span class="value">1,284</span>
      <span class="label">Active users</span>
    </div>
    <span class="instui-rating -size-lg">
      <span class="star -filled">★</span>
      <span class="star -filled">★</span>
      <span class="star -filled">★</span>
      <span class="star">★</span>
      <span class="star">★</span>
    </span>
    <span
      class="instui-progress-circle -color-success"
      style="--value: 60"
      role="img"
      aria-label="60 percent"
    ></span>
    <span class="instui-spinner -size-sm" role="status" aria-label="Loading"></span>
  </div>

  <div style="display: flex; gap: 16px; align-items: center; flex-wrap: wrap">
    <label class="instui-checkbox"><input type="checkbox" checked /> Custom checkbox</label>
    <label class="instui-checkbox -variant-toggle"><input type="checkbox" checked /> Toggle</label>
    <label class="instui-radio"><input type="radio" name="c-demo" checked /> Radio</label>
  </div>

  <div class="instui-progress">
    <div class="bar -color-success" style="width: 60%"></div>
  </div>
</div>
