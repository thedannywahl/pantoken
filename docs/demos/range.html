<div class="instui-card">
  <div style="display: flex; align-items: center; gap: 12px">
    <label for="range-demo">Volume</label>
    <input id="range-demo" class="instui-range" type="range" min="0" max="100" value="40" />
    <span class="instui-range-value" id="range-value">40</span>
  </div>
</div>

<script>
  const range = document.getElementById("range-demo");
  const value = document.getElementById("range-value");
  range.addEventListener("input", () => {
    value.textContent = range.value;
  });
</script>
