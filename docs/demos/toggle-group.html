<div class="instui-card">
  <div class="instui-toggle-group" role="group" aria-label="Text alignment" id="tg-demo">
    <button class="instui-button -toggle" aria-pressed="true">Left</button>
    <button class="instui-button -toggle" aria-pressed="false">Center</button>
    <button class="instui-button -toggle" aria-pressed="false">Right</button>
  </div>
</div>

<script>
  // A single-select segmented control: pressing one button releases the others.
  const group = document.getElementById("tg-demo");
  group.querySelectorAll(".-toggle").forEach((btn) => {
    btn.addEventListener("click", () => {
      group
        .querySelectorAll(".-toggle")
        .forEach((b) => b.setAttribute("aria-pressed", String(b === btn)));
    });
  });
</script>
