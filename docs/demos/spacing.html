<div class="instui-card">
  <h2 class="instui-heading -level-h3">Spacing</h2>
  <p class="instui-text">
    Per-side classes on the spacing scale — <code>m</code>/<code>p</code> for margin/padding, an
    optional logical side
    (<code>t</code>/<code>b</code>/<code>s</code>/<code>e</code>/<code>x</code>/<code>y</code>),
    then a step (<code>0</code>, <code>2xs</code>…<code>2xl</code>, plus <code>auto</code> for
    margin).
  </p>
  <div
    class="instui-view instui-bg-muted instui-p-sm"
    style="border-radius: var(--instui-border-radius-md)"
  >
    <div class="instui-view instui-bg-accent-blue instui-fg-on-color instui-p-xs instui-mb-2xs">
      <span class="instui-text instui-fg-on-color">p-xs, mb-2xs</span>
    </div>
    <div class="instui-view instui-bg-accent-blue instui-fg-on-color instui-p-sm instui-mb-2xs">
      <span class="instui-text instui-fg-on-color">p-sm, mb-2xs</span>
    </div>
    <div class="instui-view instui-bg-accent-blue instui-fg-on-color instui-p-lg">
      <span class="instui-text instui-fg-on-color">p-lg</span>
    </div>
  </div>

  <h3 class="instui-heading -level-h5 instui-mt-lg">Center with auto margins</h3>
  <div
    class="instui-view instui-bg-muted instui-p-sm instui-mx-auto"
    style="max-width: 12rem; border-radius: var(--instui-border-radius-md); text-align: center"
  >
    <span class="instui-text">mx-auto</span>
  </div>
</div>
