<div class="instui-card">
  <div style="display: flex; flex-direction: column; gap: 12px; max-width: 360px">
    <input class="instui-text-input" placeholder="Default" />
    <input class="instui-text-input -invalid" value="Invalid value" />
    <input class="instui-text-input -success" value="Looks good" />
    <input class="instui-text-input -readonly" value="Read only" readonly />
    <input class="instui-text-input" value="Disabled" disabled />
    <input class="instui-text-input -size-sm" placeholder="Small" />
    <input class="instui-text-input -size-lg" placeholder="Large" />

    <!-- InputGroup facade: leading / trailing icon slots (renderBeforeInput / renderAfterInput) -->
    <span class="instui-input-group">
      <span class="before instui-icon-search"></span>
      <input class="instui-text-input" placeholder="Search" />
    </span>
    <span class="instui-input-group">
      <input class="instui-text-input" type="email" placeholder="you@example.com" />
      <span class="after instui-icon-mail"></span>
    </span>
  </div>
</div>
