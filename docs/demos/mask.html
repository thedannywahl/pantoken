<!-- .instui-mask is an in-flow overlay for non-modal cases like this loading state. For a modal, a
     native <dialog>'s ::backdrop is the mask (dimmed by the same token) — see the Modal demo. -->
<div
  style="
    position: relative;
    height: 120px;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--instui-color-stroke-base);
  "
>
  <div style="padding: 12px">Content behind the mask.</div>
  <div class="instui-mask">
    <span class="instui-spinner" role="status" aria-label="Loading"></span>
  </div>
</div>
