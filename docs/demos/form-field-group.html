<div class="instui-card">
  <fieldset
    class="instui-form-field-group -layout-columns -col-spacing-medium"
    style="max-width: 640px"
  >
    <legend>Shipping address</legend>

    <label class="instui-form-field">
      <span class="label">First name</span>
      <span class="controls"><input class="instui-text-input" required /></span>
    </label>

    <label class="instui-form-field">
      <span class="label">Last name</span>
      <span class="controls"><input class="instui-text-input" required /></span>
    </label>

    <label class="instui-form-field">
      <span class="label">City</span>
      <span class="controls"><input class="instui-text-input" /></span>
    </label>

    <label class="instui-form-field">
      <span class="label">State</span>
      <span class="controls">
        <select class="instui-simple-select">
          <option>CA</option>
          <option>NY</option>
          <option>TX</option>
        </select>
      </span>
    </label>

    <div class="instui-form-field-messages" style="grid-column: 1 / -1">
      <span class="instui-form-field-message -type-hint"
        >All fields are used for delivery only.</span
      >
    </div>
  </fieldset>
</div>
